# ═══════════════════════════════════════════════════════════════
# MirrorMaker 2 Configuration
# Primary (PR) → Standby (DR) Replication
# ═══════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────
# Cluster Aliases
# These are logical names MM2 uses internally to refer to clusters
# ───────────────────────────────────────────────────────────────
clusters = primary, standby

# ───────────────────────────────────────────────────────────────
# Cluster Bootstrap Servers
# Maps each alias to its actual Kafka broker address
# In Docker Compose, these are the service names + internal port
# ───────────────────────────────────────────────────────────────
primary.bootstrap.servers = primary-kafka:9092
standby.bootstrap.servers = standby-kafka:9092

primary->standby.producer.acks=all
# ───────────────────────────────────────────────────────────────
# Replication Flow
# Defines which direction data flows: primary → standby
# ───────────────────────────────────────────────────────────────
primary->standby.enabled = true

# ───────────────────────────────────────────────────────────────
# Topic Selection
# Only replicate the commit-log topic
# MM2 will create "primary.commit-log" on the standby cluster
# ───────────────────────────────────────────────────────────────
primary->standby.topics = .*commit-log.*
refresh.topics.interval.seconds=5
refresh.groups.interval.seconds=5

sync.topic.acls.enabled=false
# ───────────────────────────────────────────────────────────────
# Consumer Group Replication
# Disable — we don't need consumer group offset sync for this project
# ───────────────────────────────────────────────────────────────
primary->standby.sync.group.offsets.enabled = false
primary->standby.emit.heartbeats.enabled = false
primary->standby.emit.checkpoints.enabled = false

# ───────────────────────────────────────────────────────────────
# MirrorSourceConnector Settings
# Controls the replication connector behavior
# ───────────────────────────────────────────────────────────────

# How often MM2 checks for new topics matching the filter (ms)
#primary->standby.refresh.topics.interval.seconds = 10

# How often MM2 syncs topic configurations from source to target (ms)
primary->standby.sync.topic.configs.enabled = true
primary->standby.sync.topic.configs.interval.seconds = 10

# Replication factor for replicated topics on standby cluster
# Set to 1 since standby is a single-node cluster
primary->standby.replication.factor = 1

# ───────────────────────────────────────────────────────────────
# MirrorCheckpointConnector — Disabled
# We don't need consumer offset checkpointing for this project
# ───────────────────────────────────────────────────────────────
primary->standby.MirrorCheckpointConnector.enabled = false

# ───────────────────────────────────────────────────────────────
# MirrorHeartbeatConnector — Disabled
# Heartbeat topics add noise; not needed for this project
# ───────────────────────────────────────────────────────────────
primary->standby.MirrorHeartbeatConnector.enabled = false

# ───────────────────────────────────────────────────────────────
# Internal Topic Settings
# MM2 uses internal topics to track offsets and state
# ───────────────────────────────────────────────────────────────

# Replication factor for MM2's internal topics on both clusters
# Must be 1 for single-node clusters
primary.config.storage.replication.factor = 1
primary.offset.storage.replication.factor = 1
primary.status.storage.replication.factor = 1

standby.config.storage.replication.factor = 1
standby.offset.storage.replication.factor = 1
standby.status.storage.replication.factor = 1

# ───────────────────────────────────────────────────────────────
# Connect Worker Settings
# MM2 runs as a Kafka Connect worker internally
# ───────────────────────────────────────────────────────────────

# Number of connector tasks (1 partition → 1 task is sufficient)
tasks.max = 1

# Offset flush interval — how often Connect commits offsets (ms)
offset.flush.interval.ms = 10000

# ───────────────────────────────────────────────────────────────
# Source Consumer Settings
# These apply to MM2's internal consumer reading from primary
# ───────────────────────────────────────────────────────────────
primary->standby.consumer.auto.offset.reset = earliest

# How long consumer waits for new messages before returning empty poll
primary->standby.consumer.fetch.max.wait.ms = 500

# ───────────────────────────────────────────────────────────────
# Logging
# ───────────────────────────────────────────────────────────────
# Log level is controlled via log4j2 in the Kafka container
# Key classes to monitor:
#   org.apache.kafka.connect.mirror.MirrorSourceTask
#   org.apache.kafka.connect.mirror.MirrorSourceConnector